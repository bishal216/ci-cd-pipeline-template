# setup.cfg

[flake8]
max-line-length = 120
# allow aligned assignments
extend-ignore = E221       
exclude =
    venv,
    build,
    dist,
    .git

[pylint.MASTER]
ignore = venv, build, dist

[pylint.FORMAT]
# keep consistent with flake8
max-line-length = 120      

[tool:pytest]
testpaths = tests
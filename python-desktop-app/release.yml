name: Build and Release Windows ZIP

on:
  push:
    branches: [ main ]
  # Optionally trigger on version tags too:
  # push:
  #   tags: [ 'v*' ]

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller <PLACEHOLDER: your app's dependencies, e.g. pygame matplotlib>

      - name: Build executable
        run: >
          pyinstaller
          --noconfirm
          --onefile
          --add-data "assets;assets"
          --add-data "data;data"
          <PLACEHOLDER_ENTRY_POINT>.py
        # --add-data "src;src" — add more --add-data flags for each folder your app needs
        # --windowed          — add this flag to hide the console window for GUI apps
        # --icon=assets/icon.ico — add this to set a custom .ico file

      - name: Package into ZIP
        run: |
          mkdir release
          copy dist\<PLACEHOLDER_ENTRY_POINT>.exe release\
          xcopy /E /I /Y assets release\assets\
          xcopy /E /I /Y data release\data\
          powershell Compress-Archive -Path release\* -DestinationPath <PLACEHOLDER_PROJECT_NAME>-win.zip

      - name: Upload ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Windows Build"
          files: <PLACEHOLDER_PROJECT_NAME>-win.zip
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}